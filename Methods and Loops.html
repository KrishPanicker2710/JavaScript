<!DOCTYPE html>
<html>
<head>
    <title>Methods and Loops</title>
    <style>
        body {
            background-image: linear-gradient();
        }
    </style>
</head>
<body>
    <p>Numbers form 0 to 10</p>
    <p id="result"></p>
    <script>
        var number = " "
        for (i = 1; i < 11; i++) 
        {
            number += " <br> ";
        }
        document.write("A random number between 0 and 10 is " + Math.floor(Math.random() * 10) + ".             ");
        var date = new Date();
        document.write("Today's date is " + date.getDate() + " in the 2026.");
    </script>
</body>
</html>
